<nav class="navbar">
  <div class="navbar__brand">
    <a routerLink="/events" class="navbar__brand-link">
      <div class="navbar__logo">
        <svg
          width="28"
          height="28"
          viewBox="0 0 28 28"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M14 2L3 7v7c0 6.08 4.72 11.76 11 13 6.28-1.24 11-6.92 11-13V7L14 2z"
            fill="#FFB81C"
          />
          <path
            d="M14 6L6 10v5c0 4.28 3.32 8.28 8 9.36 4.68-.08 8-4.08 8-9.36v-5L14 6z"
            fill="#002D72"
          />
          <path
            d="M10 14l3 3 5-5"
            stroke="#FFB81C"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <div class="navbar__brand-text">
        <span class="navbar__brand-title">Eventos Académicos</span>
        <span class="navbar__brand-sub">Pontificia Universidad Javeriana</span>
      </div>
    </a>
  </div>

  <div class="navbar__links">
    <a
      routerLink="/events"
      routerLinkActive="navbar__link--active"
      class="navbar__link"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </svg>
      Catálogo
    </a>

    <ng-container *ngIf="currentUser$ | async as navUser">
      <a
        routerLink="/mis-inscripciones"
        routerLinkActive="navbar__link--active"
        class="navbar__link"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
        Mis inscripciones
      </a>
      <a
        *ngIf="navUser.rol === 'ADMIN' || navUser.rol === 'ORGANIZADOR'"
        routerLink="/events/admin"
        routerLinkActive="navbar__link--active"
        class="navbar__link"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        Gestión de eventos
      </a>
    </ng-container>

    <div class="navbar__divider"></div>

    <ng-container *ngIf="currentUser$ | async as user; else guestTpl">
      <div class="navbar__user-info">
        <div class="navbar__avatar">
          {{ user.nombre.charAt(0).toUpperCase() }}
        </div>
        <span class="navbar__user-name">{{ user.nombre }}</span>
      </div>
      <button class="navbar__btn navbar__btn--logout" (click)="logout()">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Cerrar sesión
      </button>
    </ng-container>

    <ng-template #guestTpl>
      <a routerLink="/auth/login" class="navbar__btn navbar__btn--primary">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <polyline points="10 17 15 12 10 7" />
          <line x1="15" y1="12" x2="3" y2="12" />
        </svg>
        Iniciar sesión
      </a>
    </ng-template>
  </div>
</nav>
