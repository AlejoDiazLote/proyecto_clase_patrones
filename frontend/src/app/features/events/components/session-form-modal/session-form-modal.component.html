<div class="sfm-overlay" (click)="close()">
  <div
    class="sfm-modal"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
  >
    <!-- Header -->
    <div class="sfm-modal__header">
      <div class="sfm-modal__header-left">
        <div class="sfm-modal__icon">
          <svg
            *ngIf="isEditMode"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
          >
            <path
              d="M13.488 2.513a1.75 1.75 0 0 0-2.475 0L6.75 6.774a2.75 2.75 0 0 0-.596.892l-.848 2.047a.75.75 0 0 0 .98.98l2.047-.848a2.75 2.75 0 0 0 .892-.596l4.261-4.263a1.75 1.75 0 0 0 0-2.474Z"
            />
            <path
              d="M4.75 13.5c-.69 0-1.25-.56-1.25-1.25v-7.5c0-.69.56-1.25 1.25-1.25H8a.75.75 0 0 0 0-1.5H4.75A2.75 2.75 0 0 0 2 4.75v7.5A2.75 2.75 0 0 0 4.75 15h7.5A2.75 2.75 0 0 0 15 12.25V9a.75.75 0 0 0-1.5 0v3.25c0 .69-.56 1.25-1.25 1.25h-7.5Z"
            />
          </svg>
          <svg
            *ngIf="!isEditMode"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
          >
            <path
              d="M8.75 3.75a.75.75 0 0 0-1.5 0v3.5h-3.5a.75.75 0 0 0 0 1.5h3.5v3.5a.75.75 0 0 0 1.5 0v-3.5h3.5a.75.75 0 0 0 0-1.5h-3.5v-3.5Z"
            />
          </svg>
        </div>
        <div>
          <h2 class="sfm-modal__title">
            {{ isEditMode ? "Editar sesión" : "Nueva sesión" }}
          </h2>
          <p class="sfm-modal__subtitle">
            {{
              isEditMode
                ? "Modifica los datos de la sesión"
                : "Agrega una sesión al evento"
            }}
          </p>
        </div>
      </div>
      <button
        class="sfm-modal__close"
        type="button"
        (click)="close()"
        aria-label="Cerrar"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 16 16"
          fill="currentColor"
        >
          <path
            d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"
          />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" class="sfm-form" (ngSubmit)="submit()">
      <!-- Información básica -->
      <div class="sfm-section">
        <span class="sfm-section__label">Información básica</span>
      </div>

      <div class="sfm-field sfm-field--full">
        <label class="sfm-label">Título <span class="sfm-req">*</span></label>
        <input
          formControlName="titulo"
          type="text"
          class="sfm-input"
          [class.sfm-input--error]="
            form.get('titulo')?.invalid && form.get('titulo')?.touched
          "
          placeholder="Ej. Conferencia inaugural"
          maxlength="200"
        />
        <span
          *ngIf="
            form.get('titulo')?.errors?.['required'] &&
            form.get('titulo')?.touched
          "
          class="sfm-error"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14Zm0-9.75a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0V6A.75.75 0 0 1 8 5.25Zm0 7.5a.875.875 0 1 0 0-1.75.875.875 0 0 0 0 1.75Z"
              clip-rule="evenodd"
            />
          </svg>
          El título es obligatorio
        </span>
        <span
          *ngIf="
            form.get('titulo')?.errors?.['minlength'] &&
            form.get('titulo')?.touched
          "
          class="sfm-error"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14Zm0-9.75a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0V6A.75.75 0 0 1 8 5.25Zm0 7.5a.875.875 0 1 0 0-1.75.875.875 0 0 0 0 1.75Z"
              clip-rule="evenodd"
            />
          </svg>
          Mínimo 3 caracteres
        </span>
      </div>

      <div class="sfm-field sfm-field--full">
        <label class="sfm-label"
          >Descripción <span class="sfm-optional">(opcional)</span></label
        >
        <textarea
          formControlName="descripcion"
          class="sfm-textarea"
          rows="3"
          placeholder="Describe brevemente el contenido de la sesión..."
          maxlength="1000"
        ></textarea>
      </div>

      <!-- Fechas -->
      <div class="sfm-section">
        <span class="sfm-section__label">Fechas</span>
      </div>

      <div class="sfm-field">
        <label class="sfm-label"
          >Fecha inicio <span class="sfm-req">*</span></label
        >
        <input
          formControlName="fechaInicio"
          type="datetime-local"
          class="sfm-input"
          [class.sfm-input--error]="
            form.get('fechaInicio')?.invalid && form.get('fechaInicio')?.touched
          "
        />
        <span
          *ngIf="
            form.get('fechaInicio')?.invalid && form.get('fechaInicio')?.touched
          "
          class="sfm-error"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14Zm0-9.75a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0V6A.75.75 0 0 1 8 5.25Zm0 7.5a.875.875 0 1 0 0-1.75.875.875 0 0 0 0 1.75Z"
              clip-rule="evenodd"
            />
          </svg>
          Fecha de inicio requerida
        </span>
      </div>

      <div class="sfm-field">
        <label class="sfm-label"
          >Fecha fin <span class="sfm-req">*</span></label
        >
        <input
          formControlName="fechaFin"
          type="datetime-local"
          class="sfm-input"
          [class.sfm-input--error]="
            form.get('fechaFin')?.invalid && form.get('fechaFin')?.touched
          "
        />
        <span
          *ngIf="form.get('fechaFin')?.invalid && form.get('fechaFin')?.touched"
          class="sfm-error"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14Zm0-9.75a.75.75 0 0 1 .75.75v4a.75.75 0 0 1-1.5 0V6A.75.75 0 0 1 8 5.25Zm0 7.5a.875.875 0 1 0 0-1.75.875.875 0 0 0 0 1.75Z"
              clip-rule="evenodd"
            />
          </svg>
          Fecha de fin requerida
        </span>
      </div>

      <!-- Error servidor -->
      <div *ngIf="serverError" class="sfm-server-error sfm-field--full">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 16 16"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M6.701 2.25c.577-1 2.02-1 2.598 0l5.196 9a1.5 1.5 0 0 1-1.299 2.25H2.804a1.5 1.5 0 0 1-1.3-2.25l5.197-9ZM8 5a.75.75 0 0 1 .75.75v2.5a.75.75 0 0 1-1.5 0v-2.5A.75.75 0 0 1 8 5Zm0 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"
            clip-rule="evenodd"
          />
        </svg>
        {{ serverError }}
      </div>

      <!-- Footer -->
      <div class="sfm-footer">
        <button type="button" class="sfm-btn sfm-btn--ghost" (click)="close()">
          Cancelar
        </button>
        <button
          type="submit"
          class="sfm-btn sfm-btn--primary"
          [disabled]="submitting"
        >
          <span *ngIf="submitting" class="sfm-spinner"></span>
          <svg
            *ngIf="!submitting"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            fill="currentColor"
            class="sfm-btn__icon"
          >
            <path
              d="M13.488 2.513a1.75 1.75 0 0 0-2.475 0L6.75 6.774a2.75 2.75 0 0 0-.596.892l-.848 2.047a.75.75 0 0 0 .98.98l2.047-.848a2.75 2.75 0 0 0 .892-.596l4.261-4.263a1.75 1.75 0 0 0 0-2.474Z"
            />
            <path
              d="M4.75 13.5c-.69 0-1.25-.56-1.25-1.25v-7.5c0-.69.56-1.25 1.25-1.25H8a.75.75 0 0 0 0-1.5H4.75A2.75 2.75 0 0 0 2 4.75v7.5A2.75 2.75 0 0 0 4.75 15h7.5A2.75 2.75 0 0 0 15 12.25V9a.75.75 0 0 0-1.5 0v3.25c0 .69-.56 1.25-1.25 1.25h-7.5Z"
            />
          </svg>
          {{ isEditMode ? "Guardar cambios" : "Crear sesión" }}
        </button>
      </div>
    </form>
  </div>
</div>
