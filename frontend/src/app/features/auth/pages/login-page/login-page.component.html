<div class="login-wrapper">
  <div class="login-card">
    <!-- Logo / Brand -->
    <div class="login-card__header">
      <div class="login-card__logo">
        <svg
          width="32"
          height="32"
          viewBox="0 0 28 28"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="login-card__logo-icon"
        >
          <path
            d="M14 2L3 7v7c0 6.08 4.72 11.76 11 13 6.28-1.24 11-6.92 11-13V7L14 2z"
            fill="#FFB81C"
          />
          <path
            d="M14 6L6 10v5c0 4.28 3.32 8.28 8 9.36 4.68-.08 8-4.08 8-9.36v-5L14 6z"
            fill="#002D72"
          />
          <path
            d="M10 14l3 3 5-5"
            stroke="#FFB81C"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <h1 class="login-card__title">Eventos Académicos</h1>
      <p class="login-card__subtitle">Pontificia Universidad Javeriana</p>
    </div>

    <!-- Error global -->
    <div *ngIf="errorMessage" class="login-card__error" role="alert">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor"
        class="login-card__error-icon"
      >
        <path
          fill-rule="evenodd"
          d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"
          clip-rule="evenodd"
        />
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Formulario -->
    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      novalidate
      class="login-card__form"
    >
      <!-- Correo -->
      <div class="form-field">
        <label for="correo" class="form-field__label">Correo electrónico</label>
        <input
          id="correo"
          type="email"
          formControlName="correo"
          autocomplete="email"
          placeholder="tu@correo.edu"
          class="form-field__input"
          [class.form-field__input--error]="correo.invalid && correo.touched"
        />
        <span
          *ngIf="correo.touched && correo.hasError('required')"
          class="form-field__hint form-field__hint--error"
        >
          El correo es obligatorio.
        </span>
        <span
          *ngIf="correo.touched && correo.hasError('email')"
          class="form-field__hint form-field__hint--error"
        >
          Ingresa un correo válido.
        </span>
      </div>

      <!-- Contraseña -->
      <div class="form-field">
        <label for="password" class="form-field__label">Contraseña</label>
        <div class="form-field__password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="form-field__input form-field__input--password"
            [class.form-field__input--error]="
              password.invalid && password.touched
            "
          />
          <button
            type="button"
            class="form-field__toggle-password"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="
              showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'
            "
          >
            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
              class="w-5 h-5"
            >
              <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
              <path
                fill-rule="evenodd"
                d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"
                clip-rule="evenodd"
              />
            </svg>
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
              class="w-5 h-5"
            >
              <path
                fill-rule="evenodd"
                d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l14.5 14.5a.75.75 0 1 0 1.06-1.06l-1.745-1.745a10.029 10.029 0 0 0 3.3-4.38 1.651 1.651 0 0 0 0-1.185A10.004 10.004 0 0 0 9.999 3a9.956 9.956 0 0 0-4.744 1.194L3.28 2.22ZM7.752 6.69l1.092 1.092a2.5 2.5 0 0 1 3.374 3.373l1.091 1.092a4 4 0 0 0-5.557-5.557Z"
                clip-rule="evenodd"
              />
              <path
                d="m10.748 13.93 2.523 2.523a10.014 10.014 0 0 1-3.27.547c-4.258 0-7.894-2.66-9.337-6.41a1.651 1.651 0 0 1 0-1.186A10.007 10.007 0 0 1 2.839 6.02L6.07 9.252a4 4 0 0 0 4.678 4.678Z"
              />
            </svg>
          </button>
        </div>
        <span
          *ngIf="password.touched && password.hasError('required')"
          class="form-field__hint form-field__hint--error"
        >
          La contraseña es obligatoria.
        </span>
      </div>

      <!-- Submit -->
      <button type="submit" class="login-card__btn-submit" [disabled]="loading">
        <svg
          *ngIf="loading"
          class="login-card__spinner"
          viewBox="0 0 24 24"
          fill="none"
        >
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
            class="opacity-25"
          />
          <path
            fill="currentColor"
            d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4Z"
            class="opacity-75"
          />
        </svg>
        {{ loading ? "Iniciando sesión..." : "Iniciar sesión" }}
      </button>
    </form>

    <!-- Registro -->
    <div class="login-card__divider">
      <span>o continúa con</span>
    </div>

    <button
      type="button"
      class="login-card__btn-google"
      (click)="loginWithGoogle()"
    >
      <!-- Logo oficial de Google -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 48 48"
        width="20"
        height="20"
      >
        <path
          fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
        />
        <path
          fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
        />
        <path
          fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
        />
        <path
          fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
        />
        <path fill="none" d="M0 0h48v48H0z" />
      </svg>
      Continuar con Google
    </button>

    <p class="login-card__footer">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="login-card__footer-link"
        >Regístrate aquí</a
      >
    </p>
  </div>
</div>
