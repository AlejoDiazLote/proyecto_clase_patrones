<div class="callback-wrapper">
  <!-- Cargando -->
  <div *ngIf="!error" class="callback-card">
    <div class="callback-card__logo">
      <svg
        width="36"
        height="36"
        viewBox="0 0 28 28"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M14 2L3 7v7c0 6.08 4.72 11.76 11 13 6.28-1.24 11-6.92 11-13V7L14 2z"
          fill="#FFB81C"
        />
        <path
          d="M14 6L6 10v5c0 4.28 3.32 8.28 8 9.36 4.68-.08 8-4.08 8-9.36v-5L14 6z"
          fill="#002D72"
        />
        <path
          d="M10 14l3 3 5-5"
          stroke="#FFB81C"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>
    <div class="callback-card__spinner"></div>
    <p class="callback-card__title">Iniciando sesión...</p>
    <p class="callback-card__sub">Verificando tu cuenta de Google</p>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="callback-card callback-card--error">
    <div class="callback-card__logo callback-card__logo--error">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        width="32"
        height="32"
      >
        <path
          fill-rule="evenodd"
          d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003ZM12 8.25a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75Zm0 8.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"
          clip-rule="evenodd"
        />
      </svg>
    </div>
    <p class="callback-card__title">Error al iniciar sesión</p>
    <p class="callback-card__sub">
      No pudimos verificar tu cuenta de Google. Por favor intenta de nuevo.
    </p>
    <a routerLink="/auth/login" class="callback-card__btn"
      >Volver al inicio de sesión</a
    >
  </div>
</div>
